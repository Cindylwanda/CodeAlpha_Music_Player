<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎵 Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <!-- HOME VIEW -->
        <div id="homeView" class="view active">
            <header>
                <h1>🎵 My Music</h1>
                <div class="header-actions">
                    <button id="searchToggle" title="Search"><i class="fas fa-search"></i></button>
                </div>
            </header>
            <div class="categories">
                <button class="cat-btn active" data-cat="all">All Songs</button>
                <button class="cat-btn" data-cat="playlists">Playlists</button>
                <button class="cat-btn" data-cat="albums">Albums</button>
                <button class="cat-btn" data-cat="artists">Artists</button>
                <button class="cat-btn" data-cat="genres">Genres</button>
            </div>
            <div id="contentArea"></div>
        </div>

        <!-- FULL PLAYER VIEW -->
        <div id="playerView" class="view">
            <div class="player-header">
                <button id="backBtn" title="Back to Home"><i class="fas fa-arrow-left"></i></button>
                <span id="playerTitle">Now Playing</span>
                <div class="header-volume-wrapper">
                    <button id="volumeToggle" class="volume-corner-btn" title="Volume">
                        <i class="fas fa-volume-up" id="volumeIcon"></i>
                    </button>
                    <div class="volume-popup" id="volumePopup">
                        <input class="vertical-range" type="range" id="volumeSlider" min="0" max="100" value="70" orient="vertical" />
                        <span id="volumeDisplay">70%</span>
                    </div>
                </div>
            </div>
            <div class="player-art" id="playerArt">
                <img id="playerArtImg" src="" alt="Album Art" />
            </div>
            <div class="player-info">
                <div id="playerSongTitle">Song Title</div>
                <div id="playerArtist">Artist</div>
            </div>
            <div class="player-progress">
                <input type="range" id="progressSlider" min="0" max="100" value="0" />
                <div class="time-labels">
                    <span id="currentTimeDisplay">0:00</span>
                    <span id="durationDisplay">0:00</span>
                </div>
            </div>
            <div class="player-controls">
                <button id="shuffleBtn" title="Shuffle"><i class="fas fa-random"></i></button>
                <button id="prevBtn" title="Previous"><i class="fas fa-step-backward"></i></button>
                <button id="playBtn" title="Play / Pause"><i class="fas fa-play"></i></button>
                <button id="nextBtn" title="Next"><i class="fas fa-step-forward"></i></button>
                <button id="repeatBtn" title="Repeat"><i class="fas fa-redo"></i></button>
            </div>
            <button id="lyricsBtn" class="lyrics-toggle" title="View Lyrics"><i class="fas fa-scroll"></i> Lyrics</button>
            <div id="lyricsContainer" class="lyrics-box" style="display:none;">
                <p id="lyricsText">No lyrics available for this song.</p>
            </div>
        </div>

        <!-- MINI PLAYER -->
        <div id="miniPlayer" class="mini-player">
            <div class="mini-info" id="miniInfo">
                <img id="miniArt" src="" alt="cover" />
                <div class="mini-meta">
                    <span id="miniTitle">No song</span>
                    <span id="miniArtist">-</span>
                </div>
            </div>
            <div class="mini-controls">
                <button id="miniPrev" title="Previous"><i class="fas fa-step-backward"></i></button>
                <button id="miniPlay" title="Play / Pause"><i class="fas fa-play"></i></button>
                <button id="miniNext" title="Next"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="mini-progress">
                <div id="miniProgressFill" style="width:0%;"></div>
            </div>
        </div>
    </div>

    <!-- SONG MENU MODAL -->
    <div id="songMenuModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <span>Song Options</span>
                <button id="closeMenuModal">&times;</button>
            </div>
            <ul id="songMenuList">
                <li data-action="play"><i class="fas fa-play"></i> Play</li>
                <li data-action="playnext"><i class="fas fa-step-forward"></i> Play Next</li>
                <li data-action="addqueue"><i class="fas fa-plus-circle"></i> Add to Queue</li>
                <li data-action="addplaylist"><i class="fas fa-list"></i> Add to Playlist</li>
                <li data-action="delete"><i class="fas fa-trash"></i> Delete from Device</li>
            </ul>
        </div>
    </div>

    <!-- ADD TO PLAYLIST MODAL -->
    <div id="addPlaylistModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <span>Add to Playlist</span>
                <button id="closePlaylistModal">&times;</button>
            </div>
            <ul id="playlistList"></ul>
            <div class="add-playlist-input">
                <input type="text" id="newPlaylistName" placeholder="New playlist name..." />
                <button id="createPlaylistBtn">Create</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js">
    </script>
    <script src="script.js"></script>
</body>
</html>
